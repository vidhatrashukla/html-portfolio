<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Portfolios | Vidhatra Shukla</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f8f8f8;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        .portfolio-list {
            list-style: none;
            padding: 0;
        }
        .portfolio-list li {
            margin-bottom: 1rem;
        }
        .portfolio-list a {
            display: block;
            padding: 1rem 1.5rem;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            text-decoration: none;
            color: #1a1a1a;
            transition: all 0.3s ease;
        }
        .portfolio-list a:hover {
            border-color: #1a1a1a;
            transform: translateY(-2px);
        }
        .portfolio-list .date {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.25rem;
        }
    </style>
</head>

    <h1>My Old Portfolios</h1>
    <ul class="portfolio-list">
        <li>
            <a href="first-portfolio/index.html">
